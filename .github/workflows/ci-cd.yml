name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'          # dispara en tags tipo v1.0.0, v2.1.3, etc.
  pull_request:
    branches: [main]

env:
  DOCKERHUB_IMAGE: cdcd/php-cicd-demo

jobs:
  # ─── 1. TEST ──────────────────────────────────────────────────────────────────
  test:
    name: Lint & Syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: PHP syntax check
        run: find src -name "*.php" -exec php -l {} \;

  # ─── 2. BUILD & PUSH ──────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read

    outputs:
      image_version: ${{ steps.meta.outputs.version }}
      image_tags:    ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cdcd
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Genera automaticamente los tags segun el evento:
      #   push a main  → latest + sha-xxxxxxx
      #   push tag v1.2.3 → 1.2.3 + 1.2 + 1 + latest
      - name: Extract metadata & tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=PHP CI/CD Demo
            org.opencontainers.image.description=App de demo con login y dashboard
            org.opencontainers.image.vendor=mleivag3

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Resumen de imagenes publicadas
        run: |
          echo "## Docker Hub - Imagenes publicadas" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags completos | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

  # ─── 3. DEPLOY ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy al servidor
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
      - name: Deploy via webhook
        run: |
          curl -s -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -d '{
              "image":   "cdcd/php-cicd-demo:${{ needs.build.outputs.image_version }}",
              "version": "${{ needs.build.outputs.image_version }}",
              "sha":     "${{ github.sha }}",
              "actor":   "${{ github.actor }}",
              "ref":     "${{ github.ref }}"
            }' \
            --max-time 30 || echo "Webhook no configurado aun - deploy manual requerido"

      - name: Resumen del deploy
        if: always()
        run: |
          echo "## Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ needs.build.outputs.image_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
