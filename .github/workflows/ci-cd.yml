name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

env:
  DOCKERHUB_IMAGE: cdcd/php-cicd-demo

jobs:

  # ─── 1. TEST ──────────────────────────────────────────────────────────────────
  test:
    name: Lint & Syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: PHP syntax check
        run: find src -name "*.php" -exec php -l {} \;

  # ─── 2. BUILD & PUSH ──────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read

    outputs:
      image_version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: cdcd
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generar tags automaticos
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build y push a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ github.run_id }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── 3. DEPLOY ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy al servidor via SSH
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Instalar sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via SSH
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_USER:     ${{ secrets.SSH_USER }}
          SSH_HOST:     ${{ secrets.SSH_HOST }}
          APP_VERSION:  ${{ needs.build.outputs.image_version }}
        run: |
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" << EOF
            cd /root/php-cicd-demo
            docker compose pull
            APP_VERSION=$APP_VERSION docker compose up -d --remove-orphans
            echo "Deploy OK - version: $APP_VERSION"
            docker ps --filter name=php-cicd-demo --format 'Contenedor: {{.Names}} | {{.Status}}'
          EOF
