name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

jobs:

  # ─── 1. TEST - Sintaxis PHP nativa ────────────────────────────────────────────
  test:
    name: PHP Syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: PHP syntax check
        run: find src -name "*.php" -exec php -l {} \;

  # ─── 2. AI REVIEW - Ollama como verificador de codigo ─────────────────────────
  ai-review:
    name: AI Code Review (Ollama)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Verificar codigo PHP con Ollama
        id: ollama
        run: |
          set +e   # no salir automaticamente en error de grep
          echo "=== Escaneando src/ en busca de vulnerabilidades ==="

          # ── Busqueda de patrones inseguros en TODOS los PHP de src/ ──────────
          SQL=$(grep -rn --include="*.php" "SELECT\|INSERT\|UPDATE\|DELETE" src/ | grep '\$')
          XSS=$(grep -rn --include="*.php" "echo \$" src/ | grep -v "htmlspecialchars\|htmlentities\|strip_tags")
          PWD=$(grep -rn --include="*.php" -i "password\s*=" src/ | grep '"' | grep -v "USERS\|getenv\|password_verify\|password_hash")
          GET=$(grep -rn --include="*.php" '\$_GET\[\|\$_POST\[\|\$_REQUEST\[' src/)

          echo "SQL matches: $SQL"
          echo "XSS matches: $XSS"
          echo "PWD matches: $PWD"
          echo "GET matches: $GET"

          FAIL=0
          [ -n "$SQL" ] && FAIL=1
          [ -n "$XSS" ] && FAIL=1
          [ -n "$PWD" ] && FAIL=1
          [ -n "$GET" ] && FAIL=1

          # ── Ollama: resumen narrativo del codigo ─────────────────────────────
          CODE=$(head -25 src/config.php 2>/dev/null || echo "sin codigo")
          OLLAMA_SUMMARY=$(curl -s --max-time 40 -X POST http://213.199.37.66:11434/api/generate \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"qwen2.5:0.5b\",\"prompt\":\"List security vulnerabilities in this PHP code in 2 sentences max:\\n$CODE\",\"stream\":false}" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('response','')[:250])" 2>/dev/null \
            || echo "Ollama no disponible")

          # ── GitHub Step Summary ───────────────────────────────────────────────
          {
            echo "## AI Code Review - Ollama + Scanner"
            echo ""
            echo "**Modelo:** qwen2.5:0.5b"
            echo ""
            echo "### Analisis Ollama"
            echo "$OLLAMA_SUMMARY"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAIL" = "1" ]; then
            {
              echo "### FAIL - Problemas criticos detectados"
              echo ""
              [ -n "$SQL" ] && echo "- **SQL Injection:** $SQL"
              [ -n "$XSS" ] && echo "- **XSS:** $XSS"
              [ -n "$PWD" ] && echo "- **Password hardcodeada:** $PWD"
              [ -n "$GET" ] && echo "- **Input sin validar:** $GET"
              echo ""
              echo "> Build detenido. Corrige los problemas y vuelve a hacer push."
            } >> "$GITHUB_STEP_SUMMARY"
            echo ""
            echo "::error::AI Review - se detectaron vulnerabilidades criticas en el codigo PHP"
            exit 1
          else
            echo "### PASS - Codigo aprobado" >> "$GITHUB_STEP_SUMMARY"
            echo "AI Review: codigo aprobado - build continua"
          fi

  # ─── 3. BUILD & PUSH ──────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: ai-review
    if: github.event_name != 'pull_request'
    permissions:
      contents: read

    outputs:
      image_version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generar tags automaticos
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/php-cicd-demo
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build y push a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ github.run_id }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ─── 4. DEPLOY + ROLLBACK ─────────────────────────────────────────────────────
  deploy:
    name: Deploy + Rollback automatico
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Instalar sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy con rollback automatico
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_USER:     ${{ secrets.SSH_USER }}
          SSH_HOST:     ${{ secrets.SSH_HOST }}
          APP_VERSION:  ${{ needs.build.outputs.image_version }}
          DH_USER:      ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN:     ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          SSH="sshpass -p $SSH_PASSWORD ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST"

          $SSH "
            set -e
            cd /root/php-cicd-demo

            echo '--- Guardando version para rollback ---'
            CURRENT=\$(docker inspect php-cicd-demo --format='{{index .Config.Image}}' 2>/dev/null || echo none)
            echo \$CURRENT > /tmp/rollback_image.txt
            echo \"Version anterior: \$CURRENT\"

            echo '--- Eliminando contenedor anterior si existe ---'
            docker stop php-cicd-demo 2>/dev/null || true
            docker rm   php-cicd-demo 2>/dev/null || true

            echo '--- Pull nueva imagen (repo publico, sin login) ---'
            APP_VERSION=${APP_VERSION} DOCKERHUB_USERNAME=${DH_USER} docker compose pull

            echo '--- Aplicando deploy ---'
            APP_VERSION=${APP_VERSION} DOCKERHUB_USERNAME=${DH_USER} docker compose up -d --remove-orphans

            echo '--- Verificando salud (15s) ---'
            sleep 15
            HTTP=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/ || echo 000)
            echo \"HTTP: \$HTTP\"

            if [ \"\$HTTP\" != '200' ]; then
              echo 'DEPLOY FALLO — ejecutando rollback...'
              ROLLBACK=\$(cat /tmp/rollback_image.txt)
              if [ \"\$ROLLBACK\" != 'none' ] && [ -n \"\$ROLLBACK\" ]; then
                docker stop php-cicd-demo 2>/dev/null || true
                docker rm   php-cicd-demo 2>/dev/null || true
                docker run -d --name php-cicd-demo --restart unless-stopped -p 8080:80 \"\$ROLLBACK\"
                echo \"Rollback aplicado: \$ROLLBACK\"
              fi
              exit 1
            fi

            echo \"Deploy exitoso — version: ${APP_VERSION} | HTTP: \$HTTP\"
            docker ps --filter name=php-cicd-demo --format 'Contenedor: {{.Names}} | {{.Status}}'
          "

      - name: Resumen del deploy
        if: always()
        run: |
          echo "## 🚀 Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ needs.build.outputs.image_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
